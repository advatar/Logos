name: ci

on:
  push:
  pull_request:

jobs:
  python-simulator:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python3 scripts/demo_e2e.py
      - run: python3 -m unittest scripts/test_protocol.py
      - run: python3 -m unittest scripts/test_basecamp_package.py
      - run: python3 -m unittest scripts/test_runtime_checks.py
      - run: python3 -m unittest scripts/test_success_criteria.py
      - run: python3 -m unittest scripts/test_phase_closure.py

  rust:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.82.0
      - run: cargo build --workspace
      - run: cargo test --workspace
      - run: ./scripts/demo_e2e.sh
      - run: ./scripts/measure_cu.sh | tee /tmp/lp0016-cu.json

  risc0-feature:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo check --manifest-path zk/membership-host/Cargo.toml --features risc0

  basecamp-static:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src
    steps:
      - uses: actions/checkout@v4
      - run: test -f app/basecamp-forum/Main.qml
      - run: grep -q "Submit slash" app/basecamp-forum/Main.qml
      - run: grep -q "post after slash rejected" app/basecamp-forum/Main.qml
      - run: ./scripts/package_basecamp.sh /tmp/lp0016-basecamp

  lean:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src
    steps:
      - uses: actions/checkout@v4
      - uses: leanprover/lean-action@v1
        with:
          lake-package-directory: src/lean
